<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Etiqueta</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #f2f2f2;
  }

  .container {
    padding: 10px;
  }

  /* etiqueta 48x30 */
  .label {
    width: 48mm;
    height: 30mm;
    background: white;
    padding: 2mm;
    box-sizing: border-box;
    overflow: hidden;

    display: flex;
    flex-direction: column;
  }

  .title {
    font-size: 10pt;
    font-weight: bold;
    text-align: center;
    border-bottom: 1px solid #000;
    margin-bottom: 1mm;
  }

  .line {
    font-size: 7pt;
    margin-bottom: 1mm;
  }

  button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
  }
</style>
</head>

<body>

<div class="container">

  <!-- ETIQUETA -->
  <div id="label" class="label">
    <div class="title" id="produto">Suco Bacupari</div>

    <div class="line">Fab: <span id="fab">01/05/2026</span></div>
    <div class="line">Val: <span id="val">01/06/2026</span></div>
    <div class="line">Resp: <span id="resp">Equipe Ekatu</span></div>
  </div>

  <button onclick="gerarPDF()">Baixar etiqueta PDF</button>

</div>

<script>
window.addEventListener("DOMContentLoaded", () => {

  function getParam(name) {
    const url = new URL(window.location.href);
    return url.searchParams.get(name);
  }

  const produto = getParam("produto");
  const fab = getParam("fab");
  const val = getParam("val");
  const resp = getParam("resp");

  if (produto) document.getElementById("produto").innerText = produto;
  if (fab) document.getElementById("fab").innerText = fab;
  if (val) document.getElementById("val").innerText = val;
  if (resp) document.getElementById("resp").innerText = resp;

});

function gerarPDF() {
  const element = document.getElementById("label");

  const opt = {
    margin: 0,
    filename: "etiqueta.pdf",
    image: { type: "jpeg", quality: 1 },

    html2canvas: {
      scale: 2,
      useCORS: true,
      scrollY: 0,
      windowWidth: element.scrollWidth,
      windowHeight: element.scrollHeight
    },

    jsPDF: {
      unit: "mm",
      format: [48, 30],
      orientation: "landscape"
    },

    pagebreak: {
      avoid: "all"
    }
  };

  html2pdf().set(opt).from(element).save();
}
</script>

</body>
</html>
