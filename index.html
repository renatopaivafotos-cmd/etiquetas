<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Etiqueta</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #f2f2f2;
  }

  .container {
    padding: 10px;
  }

  .label {
    width: 340px;
    height: 210px;
    background: white;
    padding: 10px;
    box-sizing: border-box;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .title {
    font-size: 18px;
    font-weight: bold;
    text-align: center;
    border-bottom: 1px solid #000;
    margin-bottom: 8px;
  }

  .line {
    font-size: 14px;
    margin-bottom: 4px;
  }

  button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
  }
</style>
</head>

<body>

<div class="container">

  <div id="label" class="label">
    <div class="title" id="produto">Suco Bacupari</div>

    <div class="line">Fab: <span id="fab">01/05/2026</span></div>
    <div class="line">Val: <span id="val">01/06/2026</span></div>
    <div class="line">Resp: <span id="resp">Equipe Ekatu</span></div>
  </div>

  <button onclick="baixarPDF()">Baixar PDF da Etiqueta</button>

</div>

<script>
function getParam(name) {
  const url = new URL(window.location.href);
  return url.searchParams.get(name);
}

window.addEventListener("DOMContentLoaded", () => {
  const produto = getParam("produto");
  const fab = getParam("fab");
  const val = getParam("val");
  const resp = getParam("resp");

  if (produto) document.getElementById("produto").innerText = produto;
  if (fab) document.getElementById("fab").innerText = fab;
  if (val) document.getElementById("val").innerText = val;
  if (resp) document.getElementById("resp").innerText = resp;
});

async function baixarPDF() {
  const node = document.getElementById("label");

  const dataUrl = await window.htmlToImage.toPng(node, {
    cacheBust: true,
    pixelRatio: 3
  });

  const { jsPDF } = window.jspdf;

  const pdf = new jsPDF({
    orientation: "landscape",
    unit: "mm",
    format: [48, 30]
  });

  pdf.addImage(dataUrl, "PNG", 0, 0, 48, 30);
  pdf.save("etiqueta.pdf");
}
</script>

</body>
</html>
