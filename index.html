<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Etiqueta</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #f2f2f2;
  }

  .label {
    width: 48mm;
    height: 30mm;
    background: white;
    padding: 2mm;
    box-sizing: border-box;
    overflow: hidden;
  }

  .title {
    font-size: 10pt;
    font-weight: bold;
    text-align: center;
    border-bottom: 1px solid #000;
    margin-bottom: 1mm;
  }

  .line {
    font-size: 7pt;
    margin-bottom: 1mm;
  }

  button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
  }

  .container {
    padding: 10px;
  }
</style>
</head>

<body>

<div class="container">

  <div id="label" class="label">
    <div class="title" id="produto">Suco Bacupari</div>

    <div class="line">Fab: <span id="fab">01/05/2026</span></div>
    <div class="line">Val: <span id="val">01/06/2026</span></div>
    <div class="line">Resp: <span id="resp">Equipe Ekatu</span></div>
  </div>

  <button onclick="gerarPDF()">Baixar etiqueta PDF</button>

</div>

<script>
function gerarPDF() {
  const element = document.getElementById("label");

  const opt = {
    margin: 0,
    filename: 'etiqueta.pdf',
    image: { type: 'jpeg', quality: 1 },
    html2canvas: { scale: 5 },
    jsPDF: { unit: 'mm', format: [48, 30], orientation: 'landscape' }
  };

  html2pdf().set(opt).from(element).save();
}
</script>

</body>
</html>
