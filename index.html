<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Etiqueta</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f2f2f2;
  }

  .container {
    padding: 10px;
  }

  /* ETIQUETA 48x30mm */
  .label {
    width: 48mm;
    height: 30mm;
    background: white;
    padding: 2mm;
    box-sizing: border-box;
    border: 1px solid #000;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .title {
    font-size: 10pt;
    font-weight: bold;
    text-align: center;
    border-bottom: 1px solid #000;
    margin-bottom: 1mm;
  }

  .line {
    font-size: 7pt;
    margin-bottom: 1mm;
  }

  button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    font-size: 14px;
  }

  /* 🔥 PRINT CORRETO TÉRMICO */
  @media print {

    body {
      background: white;
    }

    .container {
      padding: 0;
    }

    .label {
      width: 48mm;
      height: 30mm;
      margin: 0;
      border: none;
      page-break-after: avoid;
      break-inside: avoid;
    }

    button {
      display: none;
    }

    @page {
      size: 48mm 30mm;
      margin: 0;
    }
  }
</style>
</head>

<body>

<div class="container">

  <!-- ETIQUETA -->
  <div id="label" class="label">
    <div class="title" id="produto">Suco Bacupari</div>

    <div class="line">Fab: <span id="fab">01/05/2026</span></div>
    <div class="line">Val: <span id="val">01/06/2026</span></div>
    <div class="line">Resp: <span id="resp">Ekatu</span></div>
  </div>

  <button onclick="imprimir()">Imprimir Etiqueta</button>

</div>

<script>
function getParam(name) {
  const url = new URL(window.location.href);
  return url.searchParams.get(name);
}

document.getElementById("produto").innerText =
  getParam("produto") || "Suco Bacupari";

document.getElementById("fab").innerText =
  getParam("fab") || "01/05/2026";

document.getElementById("val").innerText =
  getParam("val") || "01/06/2026";

document.getElementById("resp").innerText =
  getParam("resp") || "Ekatu";

/* ✔️ IMPRESSÃO SIMPLES E ESTÁVEL */
function imprimir() {
  window.print();
}
</script>

</body>
</html>
