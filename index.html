<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Etiqueta</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: white;
  }

  .wrapper {
    padding: 0;
  }

  /* etiqueta real */
  .label {
    width: 48mm;
    height: 30mm;
    padding: 2mm;
    box-sizing: border-box;
    overflow: hidden;
    border: 1px solid #000;

    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }

  .title {
    font-size: 11px;
    font-weight: bold;
    text-align: center;
    border-bottom: 1px solid #000;
    margin-bottom: 2mm;
  }

  .line {
    font-size: 9px;
    margin-bottom: 1mm;
  }

  button {
    margin: 10px;
    padding: 10px;
    width: calc(100% - 20px);
  }

  /* 🔥 PRINT CONTROLADO (isso é o que estava faltando antes) */
  @media print {
    body {
      margin: 0;
    }

    button {
      display: none;
    }

    .wrapper {
      margin: 0;
      padding: 0;
    }

    .label {
      border: none;
      width: 48mm;
      height: 30mm;
      page-break-after: avoid;
      break-inside: avoid;
    }

    @page {
      size: 48mm 30mm;
      margin: 0;
    }
  }
</style>
</head>

<body>

<div class="wrapper">

  <div class="label">
    <div class="title" id="produto">Suco Bacupari</div>

    <div class="line">Fab: <span id="fab">01/05/2026</span></div>
    <div class="line">Val: <span id="val">01/06/2026</span></div>
    <div class="line">Resp: <span id="resp">Ekatu</span></div>
  </div>

  <button onclick="window.print()">Imprimir etiqueta</button>

</div>

<script>
function getParam(name) {
  const url = new URL(window.location.href);
  return url.searchParams.get(name);
}

document.getElementById("produto").innerText =
  getParam("produto") || "Suco Bacupari";

document.getElementById("fab").innerText =
  getParam("fab") || "01/05/2026";

document.getElementById("val").innerText =
  getParam("val") || "01/06/2026";

document.getElementById("resp").innerText =
  getParam("resp") || "Ekatu";
</script>

</body>
</html>
