<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Etiqueta</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #f2f2f2;
  }

  .container {
    padding: 10px;
  }

  /* etiqueta visual */
  .label {
    width: 480px;   /* equivalente digital do 48mm */
    height: 300px;  /* equivalente digital do 30mm */
    background: white;
    border: 2px solid #000;
    padding: 10px;
    box-sizing: border-box;
  }

  .title {
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    border-bottom: 1px solid #000;
    margin-bottom: 10px;
  }

  .line {
    font-size: 18px;
    margin-bottom: 6px;
  }

  button {
    margin-top: 10px;
    padding: 12px;
    width: 100%;
  }
</style>
</head>

<body>

<div class="container">

  <div id="label" class="label">
    <div class="title" id="produto">Suco Bacupari</div>

    <div class="line">Fab: <span id="fab">01/05/2026</span></div>
    <div class="line">Val: <span id="val">01/06/2026</span></div>
    <div class="line">Resp: <span id="resp">Ekatu</span></div>
  </div>

  <button onclick="baixarImagem()">Baixar Etiqueta</button>

</div>

<script>
function getParam(name) {
  const url = new URL(window.location.href);
  return url.searchParams.get(name);
}

document.getElementById("produto").innerText =
  getParam("produto") || "Suco Bacupari";

document.getElementById("fab").innerText =
  getParam("fab") || "01/05/2026";

document.getElementById("val").innerText =
  getParam("val") || "01/06/2026";

document.getElementById("resp").innerText =
  getParam("resp") || "Ekatu";

/* 🔥 GERA IMAGEM REAL DA ETIQUETA */
function baixarImagem() {
  const node = document.getElementById("label");

  htmlToImage(node).then(function (dataUrl) {
    const link = document.createElement('a');
    link.download = 'etiqueta.png';
    link.href = dataUrl;
    link.click();
  });
}

/* mini lib inline simples */
function htmlToImage(node) {
  return new Promise((resolve) => {
    const canvas = document.createElement("canvas");
    const scale = 2;

    canvas.width = node.offsetWidth * scale;
    canvas.height = node.offsetHeight * scale;

    const ctx = canvas.getContext("2d");
    ctx.scale(scale, scale);

    const data = new XMLSerializer().serializeToString(node);
    const img = new Image();

    img.onload = function () {
      ctx.drawImage(img, 0, 0);
      resolve(canvas.toDataURL("image/png"));
    };

    const svg = `
      <svg xmlns="http://www.w3.org/2000/svg" width="${node.offsetWidth}" height="${node.offsetHeight}">
        <foreignObject width="100%" height="100%">
          ${data}
        </foreignObject>
      </svg>
    `;

    img.src = "data:image/svg+xml;base64," + btoa(svg);
  });
}
</script>

</body>
</html>
